syntax = "proto3";
package request;

option go_package = "../crosssell";

option java_multiple_files = true;
option java_package = "com.meesho.ml.feedaggregator.crosssellclient.grpc.dtos";
option java_outer_classname = "CrossSellRequestProto";

message ClickContext {
  int32 product_id = 1;
  int32 sscat_id = 2;
}

message CrossSellRequest {
  string user_id = 1;
  string cursor = 2;
  string screen = 3;
  int32 limit = 4;
  int32 widget_parent_product_id = 5;
  ClickContext click_context = 6;
  string tenant = 7;
}
