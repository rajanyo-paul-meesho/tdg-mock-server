syntax = "proto3";
package response;

option go_package = "../crosssell";

option java_multiple_files = true;
option java_package = "com.meesho.ml.feedaggregator.crosssellclient.grpc.dtos";
option java_outer_classname = "CrossSellResponseProto";

message ParentMetadata {
  int32 product_id = 1;
  int32 catalog_id = 2;
}

message TrackingMetadata {
  string feed_source = 1;
  string tracking_id = 2;
}

message CrossSellResponse {
  repeated int32 entities = 1;
  string entity_type = 2;
  ParentMetadata parent_metadata = 3;
  string cursor = 4;
  TrackingMetadata tracking = 5;
}
