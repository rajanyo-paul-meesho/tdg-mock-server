syntax = "proto3";


option java_package = "com.meesho.ml.fyiop.client.grpc.dtos";
option go_package = "../grpc/fy-iop";


message CandidateItem {
  int64 id = 1;
  string cursor = 2;
  CandidateMeta meta = 3;
}


message CandidateMeta {
  string trackingId = 1;
  map<string, string> scores = 2;
  map<string,string> context= 4;
  string source = 5;
  map<string, string> sse = 6;
}

message GetFYFeedResponse {
  repeated CandidateItem candidates = 1;
  string session = 2;
  bool hasNextCatalog = 3;
  repeated int32 slots = 4;
}

message GetFYOrganicFeedResponse {
  GetFYFeedResponse feedResponse = 1;
}

message GetFYCtFeedResponse {
  GetFYFeedResponse feedResponse = 1;
}

message GetFYAdFeedResponse {
  GetFYFeedResponse feedResponse = 1;
}

message GetComponentsResponse {
  repeated ComponentInfo components = 1;
}

message ComponentInfo {
  string name = 1;
  string source = 2;
}