syntax = "proto3";

package pdpiop;

option java_package = "com.meesho.ml.pdpiop.v1.client.grpc.dtos";
option go_package = "../../../grpc/pdp-iop/v1";

message GetSimilarEntityOrganicFeedRequest {
  GetSimilarEntityFeedRequest request = 1;
}

message GetSimilarEntityCtFeedRequest {
  GetSimilarEntityFeedRequest request = 1;
}

message GetSimilarEntityAdFeedRequest {
  GetSimilarEntityFeedRequest request = 1;
}

message GetSimilarEntityFeedRequest {
  RequestData data = 1;
}

message RequestData {
  int32  parentEntityId = 1;
  string parentEntityType = 2;
  string feedContext = 3;
  string cursor = 4;
  int32  limit = 5;
  map<string, string> meta = 6;
  int32 subSubCategoryId = 7;
}

message RefreshSimilarEntityOrganicFeedRequest {
  RefreshSimilarEntityFeedRequest request = 1;
}

message RefreshSimilarEntityFeedRequest {
  RefreshRequestData data = 1;
}

message RefreshRequestData {
  int32  parentEntityId = 1;
  string parentEntityType = 2;
  string feedContext = 3;
}
