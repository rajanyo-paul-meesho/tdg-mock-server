                              "catalog_validator"
                            ],
                            "catalog_validator": [
                              "rv_substitute_ad_cursor_builder"
                            ]
                          },
                          "component_config": {
                            "model_proxy_connector": {
                              "host_id": "rv-ad-scaleup",
                              "config_id": "rv-ad-scale-up",
                              "batch_size": 200,
                              "merge_strategy_on_failure": "shuffle",
                              "merge_config": {
                                "max_merge_item": "200"
                              },
                              "is_soft_failure_enabled": true,
                              "skip_mp_call": false,
                              "failure_threshold_percent": 60,
                              "candidate_features": {
                                "scores": [
                                  {
                                    "key_to_fetch": "score",
                                    "model_proxy_feature_name": "catalog:score"
                                  }
                                ],
                                "metadata": [
                                  {
                                    "key_to_fetch": "source_cg",
                                    "model_proxy_feature_name": "catalog:source"
                                  }
                                ]
                              },
                              "meta_scores": [
                                {
                                  "key_to_fetch": "cpc_score",
                                  "response_field": "cpc_score",
                                  "float_precision": 4
                                }
                              ]
                            },
                            "rv_substitute_online_cg_connector": {
                              "algo_name": "sscat_based_interaction_similarity",
                              "algo_variant_id": "scaleup",
                              "online_cg_host_id": "ad",
                              "limit": 2500,
                              "sub_tenant": "old_ad",
                              "candidate_context_to_add": {
                                "sub_tenant": "old_ad"
                              }
                            },
                            "catalog_visibility_filter": {
                              "filters": [
                                "ads_filter"
                              ],
                              "requested_limit_multiplier": 5
                            },
                            "slotted_feed_merger": {
                              "default_slots": [
                                2,
                                3,
                                5,
                                10,
                                11,
                                14,
                                15,
                                17,
                                20,
                                23,
                                26,
                                27,
                                30,
                                31,
                                34
                              ],
                              "default_preferred_sub_tenants": [
                                "old_ad"
                              ]
                            }
                          }
                        }
                      }
                    }'
                  logging-percent: 1
                  scaleup-percent: 0
