      default:
        ad:
          anonymous:
            variant-config:
              scaleup:
                current-scaleup:
                  config-bundle: '{
                    "generate_feed_on_the_fly": {
                    "config": {
                    "enabled": true,
                    "name": "rv_substitute_ad_scaleup",
                    "is_not_user_level": false,
                    "result_component": "rv_substitute_ad_cursor_builder",
                    "dag_config": {
                    "rv_substitute_online_cg_connector": [
                    "ad_live_filter"
                    ],
                    "ad_live_filter": [
                    "rv_substitute_ad_model_proxy_connector"
                    ],
                    "rv_substitute_ad_model_proxy_connector": [
                    "catalog_validator"
                    ],
                    "catalog_validator": [
                    "rv_substitute_ad_cursor_builder"
                    ]
                    },
                    "component_config": {
                    "rv_substitute_ad_model_proxy_connector": {
                    "host_id": "rv-substitute-ad-scaleup",
                    "config_id": "rv-ad-scale-up",
                    "merge_strategy_on_failure": "shuffle",
                    "merge_config": {
                    "max_merge_item": "500"
                    },
                    "is_soft_failure_enabled": true,
                    "failure_threshold_percent": 60,
                    "ranking_score_equation": "multiplicative",
                    "ctr_weight": 0.25,
                    "cvr_weight": 0.75,
                    "min_percentile_value": 1e-10,
                    "max_percentile_value": 99,
                    "ltr_min_threshold": 0,
                    "feature_start_index": 1,
                    "feature_end_index": 62,
                    "feature_rollout_percentage": 10,
                    "catalog_min_size": 34,
                    "default_ad_segment_draft": "missing:0_order_user_control",
                    "ranking_function": [
                    {
                    "w": 0.6,
                    "parameters": [
                    "ltr"
                    ],
                    "min": 0,
                    "max": 1
                    },
                    {
                    "w": 0.4,
                    "parameters": [
                    "cpc"
                    ],
                    "min": 0.14,
                    "max": 1.05
                    }
                    ]
                    },
                    "rv_substitute_online_cg_connector": {
                    "algo_name": "sscat_based_interaction_similarity",
                    "algo_variant_id": "scaleup",
                    "online_cg_host_id": "ad",
                    "limit": 2500
                    }
                    }
                    }
                    }
                    }'
                  logging-percent: '1'
                  scaleup-percent: '100'
          logged-in:
